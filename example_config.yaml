image4d: /path/to/4d_image.tif
output: /path/to/output_directory
log_level: INFO
lowres_factor: 0.5
dilation_radius: 2
registration_backend: fireants
registration_backend_options:
  smooth_grad_sigma_mm: 3.0
  smooth_warp_sigma_mm: 1.5
  scales: [4, 2, 1]
  affine_iterations: [200, 100, 50]
  deformable_iterations: [200, 100, 25]
  loss_type: mse          # 'mse' or 'cc' (cross-correlation)
  cc_kernel_size: 3       # only used when loss_type is 'cc'
debug: false
debug_dir: /path/to/debug_output
tp_input_groups:
  - tp_ref: 0
    tp_targets: [1, 2, 3]
    seg_ref: /path/to/seg_ref_tp0.tif
    additional_meshes:
      mesh1: /path/to/mesh1_tp0.obj
      mesh2: /path/to/mesh2_tp0.obj
  - tp_ref: 5
    tp_targets: [4, 6, 7]
    seg_ref: /path/to/seg_ref_tp5.tif
    additional_meshes:
      mesh1: /path/to/mesh1_tp5.obj